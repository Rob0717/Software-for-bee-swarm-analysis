server {
  # Listen for incoming HTTP traffic on port 80
  listen 80;

  # Hide nginx version in error pages and headers
  server_tokens off;

  # Limit maximum request body size (for file uploads, forms, etc.)
  client_max_body_size 20m;

  # Enable gzip compression to reduce response size
  gzip on;

  # Add Vary header so caches know responses may differ by compression support
  gzip_vary on;

  # Only compress responses larger than 1 KB
  gzip_min_length 1024;

  # File types that should be compressed
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

  # Prevent MIME-type sniffing by browsers
  add_header X-Content-Type-Options nosniff always;

  # Prevent this site from being embedded in iframes
  add_header X-Frame-Options DENY always;

  # Do not send referrer information to other sites
  add_header Referrer-Policy no-referrer always;

  # Folder where static frontend files are stored
  root /usr/share/nginx/html;

  # Default file to serve when requesting a directory
  index index.html;

  # Cache static files for a long time
  # This is useful for hashed frontend assets (Angular build files)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
    # Tell browser to cache these files for 1 year
    expires 1y;

    # Mark files as public and immutable (they should never change under same filename)
    add_header Cache-Control "public, immutable";

    # Do not write access logs for static asset requests
    access_log off;
  }

  location / {
    # Try to serve the requested file first
    # If it does not exist, return index.html
    # This is needed for SPA routing
    try_files $uri $uri/ /index.html;
  }

  location ^~ /api/ {
    # Forward all /api requests to the backend service
    proxy_pass http://backend:3000/api/;

    # Use HTTP/1.1 when talking to backend
    proxy_http_version 1.1;

    # Pass original host header to backend
    proxy_set_header Host $host;

    # Pass real client IP address
    proxy_set_header X-Real-IP $remote_addr;

    # Pass full forwarded IP chain
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Tell backend whether original request was HTTP or HTTPS
    proxy_set_header X-Forwarded-Proto $scheme;

    # Wait up to 60 seconds for backend response
    proxy_read_timeout 60s;
  }

  location ^~ /uploads/ {
    # Forward all /uploads requests to backend
    proxy_pass http://backend:3000/uploads/;

    # Pass original host header
    proxy_set_header Host $host;

    # Wait up to 60 seconds for backend response
    proxy_read_timeout 60s;
  }
}