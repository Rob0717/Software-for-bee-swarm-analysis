<div class="centered-container bg-gradient-to-b from-yellow-50 to-white dark:from-gray-900 dark:to-gray-800">
  <p-card class="w-full max-w-md">
    <ng-template pTemplate="title">
      <div class="text-center mb-4">
        @if (verificationOk) {
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-300 mb-4">
            <i class="pi pi-check text-green-800 text-3xl"></i>
          </div>
        } @else {
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-300 mb-4">
            <i class="pi pi-times text-red-800 text-3xl"></i>
          </div>
        }
        <h1 class="text-3xl sm:text-4xl font-bold">{{ verificationTitle | transloco }}</h1>
      </div>
    </ng-template>

    <ng-template pTemplate="subtitle">
      <p class="text-center sm:text-lg mb-6">
        {{ verificationMessage | transloco}}
      </p>
    </ng-template>

    @if (verificationOk) {
      <div class="border-t pt-4">
        <div class="text-center space-y-4">
          <p-button
            label="{{ 'auth.confirm-account.button.login' | transloco }}"
            routerLink="/auth/login"
            styleClass="w-full"
            severity="success">
          </p-button>
        </div>
      </div>
    } @else {
      <div class="border-t pt-4">
        <div class="text-center">
          <p-button
            label="{{ 'auth.confirm-account.button.homepage' | transloco }}"
            routerLink="/"
            styleClass="w-full"
            severity="secondary">
          </p-button>
        </div>
      </div>
    }
  </p-card>
</div>
