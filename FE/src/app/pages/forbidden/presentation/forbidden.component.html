<div class="page-container bg-gradient-to-b from-yellow-50 to-white dark:from-gray-900 dark:to-gray-800">
  <div class="container mx-auto px-4 py-16 md:py-24">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      <div class="text-center lg:text-left">
        <div class="mb-6">
          <p-tag
            value="403 — {{ 'forbidden.tag' | transloco }}"
            icon="pi pi-lock"
            severity="danger"
            class="inline-flex"
          ></p-tag>
        </div>

        <h1 class="text-4xl md:text-5xl font-bold text-gray-900 dark:text-white mb-4">
          {{ 'forbidden.title' | transloco }}
        </h1>

        <p class="text-lg md:text-xl text-gray-600 dark:text-gray-300 mb-8">
          {{ 'forbidden.subtitle' | transloco }}
        </p>

        <div class="flex flex-wrap gap-4 justify-center lg:justify-start">
          <p-button
            label="{{ 'forbidden.homepage' | transloco }}"
            icon="pi pi-home"
            routerLink="/"
            size="large"
          ></p-button>

          <p-button
            label="{{ 'forbidden.report' | transloco }}"
            icon="pi pi-plus-circle"
            routerLink="/reports/create"
            size="large"
            severity="secondary"
            [outlined]="true"
          ></p-button>
        </div>

        <div class="mt-10">
          <p-card class="border border-yellow-200 dark:border-yellow-900/50">
            <ng-template pTemplate="content">
              <div class="flex items-start gap-3">
                <i class="pi pi-info-circle text-yellow-700 dark:text-yellow-300 mt-1"></i>
                <div class="text-left">
                  <p class="font-semibold text-gray-900 dark:text-white mb-1">
                    {{ 'forbidden.tip.title' | transloco }}
                  </p>
                  <p class="text-gray-600 dark:text-gray-300">
                    {{ 'forbidden.tip.message' | transloco }}
                  </p>
                </div>
              </div>
            </ng-template>
          </p-card>
        </div>
      </div>

      <div class="flex justify-center">
        <div class="relative">
          <div
            class="w-64 h-64 md:w-80 md:h-80 rounded-full bg-yellow-400 dark:bg-yellow-600 opacity-20 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animate-pulse"
          ></div>

          <div class="relative z-10 text-center">
            <div class="mx-auto w-32 h-32 md:w-40 md:h-40 rounded-full bg-white dark:bg-gray-900 shadow-md flex items-center justify-center">
              <span class="text-5xl md:text-6xl font-extrabold text-yellow-600 dark:text-yellow-400">
                403
              </span>
            </div>

            <p class="text-sm text-gray-600 dark:text-gray-300 mt-6 font-semibold">
              {{ 'forbidden.graphics.message' | transloco }}
            </p>

            <div class="mt-6 flex justify-center">
              <p-image
                src="assets/logo.svg"
                width="160"
                [preview]="false"
                class="opacity-90"
              ></p-image>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-16 text-center text-sm text-gray-500 dark:text-gray-400">
      {{ 'forbidden.footer.message' | transloco }}
    </div>
  </div>
</div>
